<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontrolní bod č. 1 – nápověda</title>

<link rel="icon" href="/favicon.png">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #eef3f5 0%, #dfe8ec 100%);
  margin: 0;
  padding: 16px;
  min-height: 100vh;
  color: #1f2d33;
}

.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
  animation: fadeIn 0.4s ease;
  text-align: center;
}

h1 {
  color: #235c70;
  margin-bottom: 12px;
  font-size: 1.4rem;
}

p {
  line-height: 1.5;
  margin-bottom: 16px;
}

.buttons {
  display: grid;
  gap: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #235c70;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  opacity: 0.92;
}

.hidden {
  display: none;
}

.image-box {
  margin-top: 16px;
  padding: 14px;
  background: #f4f7f9;
  border-radius: 14px;
}

.image-box img {
  width: 100%;
  border-radius: 10px;
}

@media (min-width: 700px) {
  body {
    padding: 28px;
  }

  .card {
    padding: 26px;
  }

  .buttons {
    grid-template-columns: 1fr 1fr;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="page">

  <div class="card" id="step1">
    <h1>Kontrola podvodníků</h1>
    <p>Opravdu jsi zkusil úplně vše?</p>

    <div class="buttons">
      <button onclick="goBack()">NE</button>
      <button onclick="showNext()">ANO</button>
    </div>
  </div>

  <div class="card hidden" id="step2">
    <h1>Nápověda</h1>

    <p>
      Dole. Zespodu.
    </p>

   
  </div>

</div>

<script>
function goBack() {
  window.location.href = "https://h48va.cz/x1kf";
}

function showNext() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}
</script>

</body>
</html>
