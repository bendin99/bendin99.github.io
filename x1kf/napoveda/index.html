<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kontrolní bod</title>

<link rel="icon" href="/favicon.png">
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #eef3f5, #dfe8ec);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 30px;
  width: 90%;
  max-width: 650px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  animation: fadeIn 0.5s ease;
  text-align: center;
}

h1 {
  color: #235c70;
  margin-bottom: 10px;
}

button {
  margin: 10px 5px 0;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #235c70;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.hidden {
  display: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card" id="step1">
  <h1>Kontrola podvodníků</h1>
  <p>Opravdu jsi zkusil úplně vše?</p>

  <button onclick="goBack()">NE</button>
  <button onclick="showNext()">ANO</button>
</div>

<div class="card hidden" id="step2">
  <h1>Nápověda</h1>

  <p>
    Neřekneme ti kde, ale řekneme ti co. Dobrý, ne?
  </p>

  <img src="H48_nalepka.png" alt="Nálepka" width="100%" style="max-width: 400px; display: block; margin: 20px auto;">
</div>

<script>
function goBack() {
  window.location.href = "https://h48va.cz/pt2z";
}

function showNext() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}
</script>

</body>
</html>
