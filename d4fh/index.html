<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontrolní bod</title>
  <link rel="icon" href="/favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef3f5 0%, #dfe8ec 100%);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      color: #1f2d33;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      animation: fadeIn 0.4s ease;
    }

    h1 {
      color: #235c70;
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    p {
      line-height: 1.55;
      margin: 0 0 14px 0;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #235c70;
    }

    .audio-box {
      background: linear-gradient(135deg, #235c70, #2f748c);
      color: white;
      padding: 16px;
      border-radius: 14px;
      margin-top: 14px;
      box-shadow: 0 6px 18px rgba(35, 92, 112, 0.18);
    }

    .audio-title {
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .audio-subtitle {
      font-size: 0.92rem;
      opacity: 0.96;
      margin-bottom: 14px;
      line-height: 1.45;
    }

    .audio-wrap {
      display: flex;
      justify-content: center;
    }

    audio {
      width: 100%;
      display: block;
      min-height: 48px;
      border-radius: 10px;
      background: white;
    }

    .answer-box {
      background: #f4f7f9;
      padding: 16px;
      border-radius: 14px;
      margin-top: 16px;
    }

    .label {
      font-weight: bold;
      color: #235c70;
      margin-bottom: 12px;
      display: block;
    }

    .coord-group {
      display: grid;
      gap: 12px;
    }

    .coord-row {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .fixed {
      font-weight: bold;
      color: #235c70;
      flex: 0 0 auto;
    }

    .coord-row input {
      border: 1px solid #c8d4da;
      border-radius: 10px;
      padding: 12px 8px;
      font-size: 16px;
      text-align: center;
      background: white;
      min-height: 46px;
    }

    .deg {
      width: 56px;
    }

    .min-left {
      width: 52px;
    }

    .min-right {
      width: 64px;
    }

    .preview {
      margin-top: 14px;
      padding: 12px;
      background: #eef4f7;
      border-radius: 10px;
      font-family: monospace;
      font-size: 0.96rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .small-note {
      margin-top: 10px;
      font-size: 0.92rem;
      color: #666;
      line-height: 1.5;
    }

    .small-note a {
      color: #235c70;
    }

    .buttons {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: none;
      background: #235c70;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.92;
    }

    .result {
      margin-top: 14px;
      font-weight: bold;
      min-height: 24px;
      line-height: 1.4;
    }

    .ok {
      color: #1f7a3d;
    }

    .bad {
      color: #b42318;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 700px) {
      body {
        padding: 28px;
      }

      .card {
        padding: 26px;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="card">
      <h1>Kontrolní bod č. 4</h1>

      <p>
        Tady si sedl. Taková cesta po kalbě do práce není jen tak. Snad máte pěkně a je tady klid.
        Budete se muset na chvíli zaposlouchat do líbezného zvuku.
      </p>

      <p class="section-title">Přesuňte se na souřadnice:</p>

      <div class="audio-box">
       

        <div class="audio-wrap">
          <audio controls preload="metadata">
            <source src="morseovka.mp3" type="audio/mpeg">
            Tvůj prohlížeč nepodporuje přehrávání audia.
          </audio>
        </div>
      </div>

      <div class="answer-box">
        <label class="label">Zadejte souřadnice:</label>

        <div class="coord-group">
          <div class="coord-row">
            <span class="fixed">N</span>
            <input id="nDeg" class="deg" type="text" inputmode="numeric" maxlength="2" placeholder="00">
            <span class="fixed">°</span>

            <input id="nMinA" class="min-left" type="text" inputmode="numeric" maxlength="2" placeholder="00">
            <span class="fixed">.</span>
            <input id="nMinB" class="min-right" type="text" inputmode="numeric" maxlength="3" placeholder="000">
            <span class="fixed">′</span>
          </div>

          <div class="coord-row">
            <span class="fixed">E</span>
            <input id="eDeg" class="deg" type="text" inputmode="numeric" maxlength="2" placeholder="00">
            <span class="fixed">°</span>

            <input id="eMinA" class="min-left" type="text" inputmode="numeric" maxlength="2" placeholder="00">
            <span class="fixed">.</span>
            <input id="eMinB" class="min-right" type="text" inputmode="numeric" maxlength="3" placeholder="000">
            <span class="fixed">′</span>
          </div>
        </div>

        <div class="preview" id="preview">N __° __.___′ E __° __.___′</div>
        <div class="small-note">Pokud máte potíže s přehráním zvuku, klikněte <a href="https://youtu.be/h7fiDAR6C88" target="_blank" rel="noopener noreferrer">zde</a></div>

        <div class="buttons">
          <button onclick="checkCoords()">Ověřit souřadnice</button>
          <button onclick="copyFormattedCoords()">Kopírovat souřadnice</button>
        </div>

        <div id="result" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    const correctHash = "76a71bf13a65eddf2e24d4539c83450144ba0e12d0b04b0f04f6470ee176bf4c";

    const nDegInput = document.getElementById("nDeg");
    const nMinAInput = document.getElementById("nMinA");
    const nMinBInput = document.getElementById("nMinB");
    const eDegInput = document.getElementById("eDeg");
    const eMinAInput = document.getElementById("eMinA");
    const eMinBInput = document.getElementById("eMinB");
    const preview = document.getElementById("preview");
    const result = document.getElementById("result");

    function cleanDigits(value) {
      return value.replace(/[^\d]/g, "");
    }

    function buildMinutes(partA, partB) {
      const a = cleanDigits(partA);
      const b = cleanDigits(partB);
      if (!a && !b) return "";
      return `${a}.${b}`;
    }

    function buildFormattedCoords() {
      const nDeg = cleanDigits(nDegInput.value);
      const nMinA = cleanDigits(nMinAInput.value);
      const nMinB = cleanDigits(nMinBInput.value);
      const eDeg = cleanDigits(eDegInput.value);
      const eMinA = cleanDigits(eMinAInput.value);
      const eMinB = cleanDigits(eMinBInput.value);

      const showNDeg = nDeg || "__";
      const showNMinA = nMinA || "__";
      const showNMinB = nMinB || "___";
      const showEDeg = eDeg || "__";
      const showEMinA = eMinA || "__";
      const showEMinB = eMinB || "___";

      return `N ${showNDeg}° ${showNMinA}.${showNMinB}′ E ${showEDeg}° ${showEMinA}.${showEMinB}′`;
    }

    function updatePreview() {
      preview.textContent = buildFormattedCoords();
    }

    function autoJump(current, next, maxLength) {
      current.addEventListener("input", () => {
        if (current.value.length >= maxLength) {
          next.focus();
        }
      });
    }

    [nDegInput, nMinAInput, nMinBInput, eDegInput, eMinAInput, eMinBInput].forEach(input => {
      input.addEventListener("input", () => {
        input.value = cleanDigits(input.value);
        updatePreview();
      });
    });

    autoJump(nDegInput, nMinAInput, 2);
    autoJump(nMinAInput, nMinBInput, 2);
    autoJump(nMinBInput, eDegInput, 3);
    autoJump(eDegInput, eMinAInput, 2);
    autoJump(eMinAInput, eMinBInput, 2);

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkCoords() {
      const nDeg = cleanDigits(nDegInput.value);
      const nMinA = cleanDigits(nMinAInput.value);
      const nMinB = cleanDigits(nMinBInput.value);
      const eDeg = cleanDigits(eDegInput.value);
      const eMinA = cleanDigits(eMinAInput.value);
      const eMinB = cleanDigits(eMinBInput.value);

      if (!nDeg || !nMinA || !nMinB || !eDeg || !eMinA || !eMinB) {
        result.textContent = "Vyplňte prosím všechny části souřadnic.";
        result.className = "result bad";
        return;
      }

      const candidate = `N ${nDeg}° ${nMinA}.${nMinB}′ E ${eDeg}° ${eMinA}.${eMinB}′`;
      const candidateHash = await sha256(candidate);

      if (candidateHash === correctHash) {
        result.textContent = "Správně, souřadnice sedí.";
        result.className = "result ok";
      } else {
        result.textContent = "To není správně, zkuste to ještě jednou.";
        result.className = "result bad";
      }
    }

    async function copyFormattedCoords() {
      const nDeg = cleanDigits(nDegInput.value) || "__";
      const nMinA = cleanDigits(nMinAInput.value) || "__";
      const nMinB = cleanDigits(nMinBInput.value) || "___";
      const eDeg = cleanDigits(eDegInput.value) || "__";
      const eMinA = cleanDigits(eMinAInput.value) || "__";
      const eMinB = cleanDigits(eMinBInput.value) || "___";

      const text = `N ${nDeg}° ${nMinA}.${nMinB}′ E ${eDeg}° ${eMinA}.${eMinB}′`;

      try {
        await navigator.clipboard.writeText(text);
        alert("Souřadnice zkopírovány");
      } catch (err) {
        alert("Kopírování se nepovedlo.");
      }
    }

    updatePreview();
  </script>

</body>
</html>
